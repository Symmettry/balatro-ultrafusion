[manifest]
version = "1.0.0"
dump_lua = false
priority = 0

[[patches]]
[patches.pattern]
target = '''functions/state_events.lua'''
pattern = '''if G.GAME.round_resets.blind == G.P_BLINDS.bl_small then'''
position = 'at'
payload = '''
if (next(SMODS.find_card("j_ultrafusion_aurora_the_prophesied_cataclysm")) or next(SMODS.find_card("j_ultrafusion_there_will_be_blood"))) and G.GAME.blind_on_deck ~= 'Boss' then
    if G.GAME.blind_on_deck == 'Small' then
        G.GAME.round_resets.blind_states.Small = 'Defeated'
    elseif G.GAME.blind_on_deck == 'Big' then
        G.GAME.round_resets.blind_states.Big = 'Defeated'
    end
elseif G.GAME.round_resets.blind == G.P_BLINDS.bl_small then
'''
match_indent = true

[[patches]]
[patches.pattern]
target = '''functions/common_events.lua'''
pattern = '''G.GAME.round_resets.boss_rerolled = false'''
position = 'before'
payload = '''
if next(SMODS.find_card("j_ultrafusion_there_will_be_blood")) then
    G.GAME.round_resets.blind_choices.Big = get_new_boss()
    G.GAME.round_resets.blind_choices.Small = get_new_boss()
elseif next(SMODS.find_card("j_ultrafusion_aurora_the_prophesied_cataclysm")) then
    G.GAME.round_resets.blind_choices.Big = get_new_boss()
    G.GAME.round_resets.blind_choices.Small = get_new_boss()
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = '''functions/common_events.lua'''
pattern = '''elseif not v.boss.showdown and (v.boss.min <= math.max(1, G.GAME.round_resets.ante) and ((math.max(1, G.GAME.round_resets.ante))%G.GAME.win_ante ~= 0 or G.GAME.round_resets.ante < 2)) then'''
position = 'at'
payload = '''
elseif not v.boss.showdown
    and not next(SMODS.find_card("j_ultrafusion_there_will_be_blood"))
    and (v.boss.min <= math.max(1, G.GAME.round_resets.ante) and ((math.max(1, G.GAME.round_resets.ante))%G.GAME.win_ante ~= 0 or G.GAME.round_resets.ante < 2)) then
'''
match_indent = true

[[patches]]
[patches.pattern]
target = '''functions/common_events.lua'''
pattern = '''elseif v.boss.showdown and (((G.GAME.round_resets.ante)%G.GAME.win_ante == 0 and G.GAME.round_resets.ante >= 2) or G.GAME.modifiers.cry_big_showdown ) then'''
position = 'at'
payload = '''
elseif v.boss.showdown and (
    ((G.GAME.round_resets.ante)%G.GAME.win_ante == 0 and G.GAME.round_resets.ante >= 2)
    or G.GAME.modifiers.cry_big_showdown
    or next(SMODS.find_card("j_ultrafusion_there_will_be_blood"))
) then
'''
match_indent = true

[[patches]]
[patches.pattern]
target = '''card.lua'''
pattern = '''        if self.ability.name == "Death" then
            local rightmost = G.hand.highlighted[1]
            for i=1, #G.hand.highlighted-1 do if G.hand.highlighted[i].T.x > rightmost.T.x then rightmost = G.hand.highlighted[i] end end
            for i=1, #G.hand.highlighted do if SMODS.is_eternal(G.hand.highlighted[i]) and rightmost ~= G.hand.highlighted[i] then return false end end
        end'''
position = 'at'
payload = '''
if self.ability.name == "Death" then
    local rightmost = G.hand.highlighted[1]
    for i=1, #G.hand.highlighted-1 do
        if G.hand.highlighted[i].T.x > rightmost.T.x then
            rightmost = G.hand.highlighted[i]
        end
    end

    if UF.U.BLOOD.has_blood_stigmata(rightmost) then
        return false
    end

    for i=1, #G.hand.highlighted do
        local c = G.hand.highlighted[i]
        if SMODS.is_eternal(c) and rightmost ~= c then
            return false
        end
        if rightmost ~= c and UF.U.BLOOD.has_blood_stigmata(c) then
            return false
        end
    end
end
'''
match_indent = true